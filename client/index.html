<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover"
    />
    <meta name="theme-color" content="#0f172a" />
    <meta name="color-scheme" content="dark" />
    <meta
      name="description"
      content="A lightweight AI chatbot with a built-in weather tool."
    />
    <title>AI Chatbot</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <!-- Reusable inline SVG icons. Referenced via <use href="#id"/>. -->
    <svg width="0" height="0" style="position:absolute" aria-hidden="true">
      <defs>
        <symbol id="i-spark" viewBox="0 0 24 24">
          <path
            fill="currentColor"
            d="M12 2.5l1.8 4.7 4.7 1.8-4.7 1.8L12 15.5l-1.8-4.7L5.5 9l4.7-1.8L12 2.5zm6.5 11l1.1 2.9 2.9 1.1-2.9 1.1-1.1 2.9-1.1-2.9-2.9-1.1 2.9-1.1 1.1-2.9z"
          />
        </symbol>
        <symbol id="i-user" viewBox="0 0 24 24">
          <path
            fill="currentColor"
            d="M12 12.5a4.5 4.5 0 1 0-4.5-4.5A4.51 4.51 0 0 0 12 12.5zm0 2c-3.86 0-8 1.93-8 5.25V21h16v-1.25c0-3.32-4.14-5.25-8-5.25z"
          />
        </symbol>
        <symbol id="i-send" viewBox="0 0 24 24">
          <path
            fill="currentColor"
            d="M3.4 20.6L21 12 3.4 3.4 3.4 10l12 2-12 2z"
          />
        </symbol>
      </defs>
    </svg>

    <div class="app" role="application" aria-label="AI Chatbot">
      <header class="app-header">
        <span class="brand" aria-hidden="true">
          <svg><use href="#i-spark" /></svg>
        </span>
        <div class="title">
          <h1>AI Chatbot</h1>
          <span class="sub">claude-haiku-4-5 &middot; weather tool</span>
        </div>
        <span class="status" aria-label="Online">
          <span class="dot" aria-hidden="true"></span>
          <span>Online</span>
        </span>
      </header>

      <main class="messages-wrap">
        <div
          id="messages"
          role="log"
          aria-live="polite"
          aria-relevant="additions"
        >
          <div id="empty" class="empty">
            <span class="logo" aria-hidden="true">
              <svg><use href="#i-spark" /></svg>
            </span>
            <h2>How can I help today?</h2>
            <p>
              Ask anything, or try one of these to get started.
            </p>
            <div class="suggestions" role="list">
              <button
                type="button"
                class="suggestion"
                data-suggestion="What's the weather in Tokyo?"
              >
                Weather in Tokyo
              </button>
              <button
                type="button"
                class="suggestion"
                data-suggestion="Explain recursion in one paragraph."
              >
                Explain recursion
              </button>
              <button
                type="button"
                class="suggestion"
                data-suggestion="Give me a 3-day Lisbon itinerary."
              >
                3-day Lisbon itinerary
              </button>
            </div>
          </div>
        </div>

        <button
          id="new-message-pill"
          class="new-message-pill"
          type="button"
          aria-label="Scroll to latest message"
        >
          ↓ New message
        </button>
      </main>

      <footer class="app-footer">
        <form id="form" autocomplete="off" novalidate>
          <label class="input-wrap" for="input">
            <textarea
              id="input"
              rows="1"
              placeholder="Message AI Chatbot…"
              aria-label="Message"
              autocapitalize="sentences"
              autocomplete="off"
              spellcheck="true"
              inputmode="text"
              enterkeyhint="send"
              required
            ></textarea>
          </label>
          <button id="send" type="submit" aria-label="Send message">
            <svg aria-hidden="true"><use href="#i-send" /></svg>
            <span class="label">Send</span>
          </button>
        </form>
      </footer>
    </div>

    <script src="./app.js"></script>
  </body>
</html>
