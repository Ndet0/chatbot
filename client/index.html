<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>AI Chatbot</title>
    <style>
      :root {
        --bg: #0f172a;
        --panel: #111827;
        --panel-2: #1f2937;
        --border: #334155;
        --text: #e2e8f0;
        --muted: #94a3b8;
        --user: #2563eb;
        --bot: #1f2937;
        --accent: #38bdf8;
        --danger: #ef4444;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        height: 100%;
      }

      body {
        margin: 0;
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue",
          Arial, sans-serif;
        background:
          radial-gradient(1200px 800px at 10% -10%, #1e293b 0%, transparent 60%),
          radial-gradient(900px 600px at 110% 110%, #0c4a6e 0%, transparent 60%),
          var(--bg);
        color: var(--text);
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
      }

      .app {
        width: 100%;
        max-width: 760px;
        height: min(86vh, 820px);
        background: var(--panel);
        border: 1px solid var(--border);
        border-radius: 16px;
        display: flex;
        flex-direction: column;
        overflow: hidden;
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.4);
      }

      header {
        padding: 16px 20px;
        border-bottom: 1px solid var(--border);
        display: flex;
        align-items: center;
        gap: 12px;
        background: linear-gradient(180deg, #1f2937 0%, #111827 100%);
      }

      header .dot {
        width: 10px;
        height: 10px;
        border-radius: 50%;
        background: var(--accent);
        box-shadow: 0 0 12px var(--accent);
      }

      header h1 {
        font-size: 16px;
        margin: 0;
        font-weight: 600;
        letter-spacing: 0.2px;
      }

      header .sub {
        margin-left: auto;
        font-size: 12px;
        color: var(--muted);
      }

      #messages {
        flex: 1;
        overflow-y: auto;
        padding: 20px;
        display: flex;
        flex-direction: column;
        gap: 12px;
        scroll-behavior: smooth;
      }

      .msg {
        max-width: 80%;
        padding: 10px 14px;
        border-radius: 14px;
        line-height: 1.45;
        white-space: pre-wrap;
        word-wrap: break-word;
        font-size: 14.5px;
        animation: fadeIn 160ms ease-out;
      }

      .msg.user {
        align-self: flex-end;
        background: var(--user);
        color: white;
        border-bottom-right-radius: 4px;
      }

      .msg.bot {
        align-self: flex-start;
        background: var(--bot);
        color: var(--text);
        border: 1px solid var(--border);
        border-bottom-left-radius: 4px;
      }

      .msg.error {
        align-self: flex-start;
        background: rgba(239, 68, 68, 0.12);
        color: #fecaca;
        border: 1px solid rgba(239, 68, 68, 0.4);
      }

      .typing {
        display: inline-flex;
        gap: 4px;
        align-items: center;
      }

      .typing span {
        width: 6px;
        height: 6px;
        border-radius: 50%;
        background: var(--muted);
        opacity: 0.5;
        animation: blink 1.2s infinite;
      }

      .typing span:nth-child(2) { animation-delay: 0.15s; }
      .typing span:nth-child(3) { animation-delay: 0.3s; }

      footer {
        border-top: 1px solid var(--border);
        padding: 12px;
        background: var(--panel-2);
      }

      form {
        display: flex;
        gap: 8px;
      }

      #input {
        flex: 1;
        background: #0b1220;
        color: var(--text);
        border: 1px solid var(--border);
        border-radius: 10px;
        padding: 12px 14px;
        font-size: 14.5px;
        outline: none;
        transition: border-color 120ms ease;
      }

      #input:focus {
        border-color: var(--accent);
      }

      button {
        background: var(--accent);
        color: #082f49;
        border: 0;
        border-radius: 10px;
        padding: 0 18px;
        font-weight: 600;
        font-size: 14px;
        cursor: pointer;
        transition: filter 120ms ease, transform 120ms ease;
      }

      button:hover { filter: brightness(1.05); }
      button:active { transform: translateY(1px); }
      button:disabled { opacity: 0.6; cursor: not-allowed; }

      @keyframes fadeIn {
        from { opacity: 0; transform: translateY(4px); }
        to { opacity: 1; transform: translateY(0); }
      }

      @keyframes blink {
        0%, 80%, 100% { opacity: 0.2; }
        40% { opacity: 1; }
      }
    </style>
  </head>
  <body>
    <div class="app">
      <header>
        <span class="dot"></span>
        <h1>AI Chatbot</h1>
        <span class="sub">claude-haiku-4-5 &middot; weather tool</span>
      </header>

      <div id="messages" aria-live="polite"></div>

      <footer>
        <form id="form" autocomplete="off">
          <input
            id="input"
            type="text"
            placeholder="Ask me anything, or try: weather in Paris"
            aria-label="Message"
            required
          />
          <button id="send" type="submit">Send</button>
        </form>
      </footer>
    </div>

    <script src="./app.js"></script>
  </body>
</html>
